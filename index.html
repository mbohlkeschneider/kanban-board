<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFCBE1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Kanban Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf3f0;
    color: #4a4a4a;
    min-height: 100vh;
    overflow-x: auto;
    -webkit-user-select: none;
    user-select: none;
  }

  header {
    background: #fff;
    padding: 16px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: #5a4a5a;
    border-bottom: 3px solid #FFCBE1;
    letter-spacing: 0.5px;
  }

  .board {
    display: flex;
    gap: 12px;
    padding: 16px;
    min-height: calc(100vh - 62px);
  }

  .column {
    flex: 1;
    min-width: 170px;
    background: #fff;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 80px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .column-header {
    padding: 14px 12px;
    font-weight: 700;
    font-size: 0.95rem;
    text-align: center;
    border-radius: 14px 14px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #5a4a5a;
  }

  .column[data-col="todo"] .column-header { background: #FFCBE1; }
  .column[data-col="doing"] .column-header { background: #F9E1A8; }
  .column[data-col="done"] .column-header { background: #D6E5BD; }

  .column-header .count {
    background: rgba(255,255,255,0.5);
    border-radius: 12px;
    padding: 2px 9px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .cards {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
    transition: background 0.2s;
  }

  .cards.drag-over {
    background: rgba(188, 216, 236, 0.2);
    border-radius: 0 0 14px 14px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 12px;
    position: relative;
    word-wrap: break-word;
    border: 2px solid #f0e8f0;
    cursor: grab;
    transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
    touch-action: none;
  }

  .card:active { cursor: grabbing; }

  .card.dragging {
    opacity: 0.4;
    transform: scale(0.96);
  }

  .card-text {
    font-size: 0.9rem;
    margin-bottom: 8px;
    line-height: 1.4;
    color: #4a4a4a;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .card-actions button {
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    color: #5a4a5a;
    font-weight: 600;
    flex: 1;
    min-width: 0;
    transition: opacity 0.15s;
  }

  .btn-left { background: #BCD8EC; }
  .btn-right { background: #DCCCEC; }
  .btn-edit { background: #FFCBE1; flex: 0 0 auto; }
  .btn-delete { background: #FFDAB4; flex: 0 0 auto; }

  .card.editing { cursor: default; border-color: #DCCCEC; }

  .edit-area {
    width: 100%;
    background: #faf3f0;
    border: 2px solid #DCCCEC;
    border-radius: 8px;
    color: #4a4a4a;
    padding: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    resize: none;
    margin-bottom: 8px;
    -webkit-user-select: text;
    user-select: text;
  }

  .edit-area:focus { outline: none; border-color: #FFCBE1; }

  .edit-actions {
    display: flex;
    gap: 6px;
  }

  .edit-actions button {
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    color: #5a4a5a;
    transition: opacity 0.15s;
  }

  .btn-save { background: #D6E5BD; }
  .btn-cancel { background: #f0e8f0; }

  .card-actions button:active { opacity: 0.6; }

  .add-form {
    padding: 8px;
    border-top: 2px solid #f5f0f5;
  }

  .add-form textarea {
    width: 100%;
    background: #faf3f0;
    border: 2px solid #f0e8f0;
    border-radius: 8px;
    color: #4a4a4a;
    padding: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    resize: none;
  }

  .add-form textarea::placeholder { color: #b0a0b0; }
  .add-form textarea:focus { outline: none; border-color: #DCCCEC; }

  .add-form button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #DCCCEC;
    color: #5a4a5a;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .add-form button:active { opacity: 0.6; }

  .drop-indicator {
    height: 4px;
    background: #BCD8EC;
    border-radius: 2px;
    margin: 2px 0;
    transition: opacity 0.15s;
  }

  /* Ghost card that follows the pointer during drag */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.9;
    transform: rotate(2deg);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    background: #fff;
    border: 2px solid #DCCCEC;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    color: #4a4a4a;
    max-width: 220px;
    word-wrap: break-word;
    line-height: 1.4;
  }
</style>
</head>
<body>

<header>Kanban Board</header>

<div class="board" id="board"></div>

<script>
const COLUMNS = [
  { id: "todo", title: "To Do" },
  { id: "doing", title: "In Progress" },
  { id: "done", title: "Done" },
];

function loadTasks() {
  try {
    return JSON.parse(localStorage.getItem("kanban_tasks")) || { todo: [], doing: [], done: [] };
  } catch {
    return { todo: [], doing: [], done: [] };
  }
}

function saveTasks(tasks) {
  localStorage.setItem("kanban_tasks", JSON.stringify(tasks));
}

/* ── Drag State ── */
let dragState = null; // { colId, idx, ghost, currentDropCol, currentDropIdx }

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

/* ── Rendering ── */
function render() {
  const tasks = loadTasks();
  const board = document.getElementById("board");
  board.innerHTML = "";

  COLUMNS.forEach((col, colIdx) => {
    const colEl = document.createElement("div");
    colEl.className = "column";
    colEl.dataset.col = col.id;

    const items = tasks[col.id] || [];

    colEl.innerHTML = `
      <div class="column-header">
        <span>${col.title}</span>
        <span class="count">${items.length}</span>
      </div>
      <div class="cards" data-col="${col.id}"></div>
      <div class="add-form">
        <textarea id="input-${col.id}" placeholder="New task..." rows="2"></textarea>
        <button onclick="addTask('${col.id}')">+ Add</button>
      </div>
    `;

    board.appendChild(colEl);
    const cardsEl = colEl.querySelector(".cards");

    items.forEach((text, idx) => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.col = col.id;
      card.dataset.idx = idx;

      const canLeft = colIdx > 0;
      const canRight = colIdx < COLUMNS.length - 1;

      let btns = "";
      if (canLeft) btns += `<button class="btn-left" onclick="moveTask('${col.id}',${idx},-1)">&larr;</button>`;
      if (canRight) btns += `<button class="btn-right" onclick="moveTask('${col.id}',${idx},1)">&rarr;</button>`;
      btns += `<button class="btn-edit" onclick="editTask('${col.id}',${idx})">&#9998;</button>`;
      btns += `<button class="btn-delete" onclick="deleteTask('${col.id}',${idx})">&#x2715;</button>`;

      card.innerHTML = `
        <div class="card-text">${escapeHtml(text)}</div>
        <div class="card-actions">${btns}</div>
      `;

      // Touch drag
      card.addEventListener("touchstart", onTouchStart, { passive: false });

      // Mouse drag
      card.addEventListener("mousedown", onMouseDown);

      cardsEl.appendChild(card);
    });
  });
}

/* ── Add / Delete / Move (button-based) ── */
function addTask(colId) {
  const input = document.getElementById("input-" + colId);
  const text = input.value.trim();
  if (!text) return;
  const tasks = loadTasks();
  tasks[colId].push(text);
  saveTasks(tasks);
  render();
}

function deleteTask(colId, idx) {
  const tasks = loadTasks();
  tasks[colId].splice(idx, 1);
  saveTasks(tasks);
  render();
}

function editTask(colId, idx) {
  const tasks = loadTasks();
  const text = tasks[colId][idx];
  const card = document.querySelector(`.card[data-col="${colId}"][data-idx="${idx}"]`);
  if (!card) return;

  card.classList.add("editing");
  card.removeEventListener("touchstart", onTouchStart);
  card.removeEventListener("mousedown", onMouseDown);

  card.innerHTML = `
    <textarea class="edit-area" rows="3">${escapeHtml(text)}</textarea>
    <div class="edit-actions">
      <button class="btn-save" onclick="saveEdit('${colId}',${idx})">Save</button>
      <button class="btn-cancel" onclick="render()">Cancel</button>
    </div>
  `;

  const textarea = card.querySelector(".edit-area");
  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
}

function saveEdit(colId, idx) {
  const card = document.querySelector(`.card[data-col="${colId}"][data-idx="${idx}"]`);
  if (!card) return;
  const textarea = card.querySelector(".edit-area");
  const newText = textarea.value.trim();
  if (!newText) return;

  const tasks = loadTasks();
  tasks[colId][idx] = newText;
  saveTasks(tasks);
  render();
}

function moveTask(fromCol, idx, direction) {
  const toCol = COLUMNS[COLUMNS.findIndex(c => c.id === fromCol) + direction].id;
  const tasks = loadTasks();
  const [item] = tasks[fromCol].splice(idx, 1);
  tasks[toCol].push(item);
  saveTasks(tasks);
  render();
}

/* ── Drag helpers ── */
function createGhost(text, x, y) {
  const ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  ghost.textContent = text;
  ghost.style.left = (x - 40) + "px";
  ghost.style.top = (y - 20) + "px";
  document.body.appendChild(ghost);
  return ghost;
}

function moveGhost(ghost, x, y) {
  ghost.style.left = (x - 40) + "px";
  ghost.style.top = (y - 20) + "px";
}

function getDropTarget(x, y) {
  const cardEls = document.querySelectorAll(".cards");
  let bestCol = null;
  let bestIdx = 0;

  for (const cardsEl of cardEls) {
    const rect = cardsEl.getBoundingClientRect();
    // Check if x is roughly within this column
    if (x >= rect.left - 20 && x <= rect.right + 20) {
      bestCol = cardsEl.dataset.col;
      const children = cardsEl.querySelectorAll(".card");
      bestIdx = children.length; // default: append at end

      for (let i = 0; i < children.length; i++) {
        const cardRect = children[i].getBoundingClientRect();
        const midY = cardRect.top + cardRect.height / 2;
        if (y < midY) {
          bestIdx = i;
          break;
        }
      }
      break;
    }
  }

  return { col: bestCol, idx: bestIdx };
}

function clearDropIndicators() {
  document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
  document.querySelectorAll(".cards.drag-over").forEach(el => el.classList.remove("drag-over"));
}

function showDropIndicator(col, idx) {
  clearDropIndicators();
  if (!col) return;

  const cardsEl = document.querySelector(`.cards[data-col="${col}"]`);
  if (!cardsEl) return;

  cardsEl.classList.add("drag-over");

  const indicator = document.createElement("div");
  indicator.className = "drop-indicator";

  const children = cardsEl.querySelectorAll(".card");
  if (idx >= children.length) {
    cardsEl.appendChild(indicator);
  } else {
    cardsEl.insertBefore(indicator, children[idx]);
  }
}

function finishDrag() {
  if (!dragState) return;

  const { colId, idx, ghost } = dragState;
  const dropCol = dragState.currentDropCol;
  let dropIdx = dragState.currentDropIdx;

  // Clean up
  if (ghost) ghost.remove();
  clearDropIndicators();
  document.querySelectorAll(".card.dragging").forEach(el => el.classList.remove("dragging"));

  // Perform the move if we have a valid target
  if (dropCol) {
    const tasks = loadTasks();
    const [item] = tasks[colId].splice(idx, 1);

    // Adjust index if moving within the same column downward
    if (colId === dropCol && dropIdx > idx) {
      dropIdx--;
    }

    tasks[dropCol].splice(dropIdx, 0, item);
    saveTasks(tasks);
  }

  dragState = null;
  render();
}

/* ── Touch Drag ── */
function onTouchStart(e) {
  // Don't drag if tapping a button or editing
  if (e.target.closest("button")) return;
  if (e.target.closest(".editing")) return;
  if (e.target.tagName === "TEXTAREA") return;

  const card = e.target.closest(".card");
  if (!card) return;

  const touch = e.touches[0];
  const colId = card.dataset.col;
  const idx = parseInt(card.dataset.idx);
  const tasks = loadTasks();
  const text = tasks[colId][idx];

  e.preventDefault();

  card.classList.add("dragging");
  const ghost = createGhost(text, touch.clientX, touch.clientY);

  dragState = { colId, idx, ghost, currentDropCol: null, currentDropIdx: 0 };

  document.addEventListener("touchmove", onTouchMove, { passive: false });
  document.addEventListener("touchend", onTouchEnd);
}

function onTouchMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const touch = e.touches[0];
  moveGhost(dragState.ghost, touch.clientX, touch.clientY);

  const { col, idx } = getDropTarget(touch.clientX, touch.clientY);
  dragState.currentDropCol = col;
  dragState.currentDropIdx = idx;
  showDropIndicator(col, idx);
}

function onTouchEnd() {
  document.removeEventListener("touchmove", onTouchMove);
  document.removeEventListener("touchend", onTouchEnd);
  finishDrag();
}

/* ── Mouse Drag ── */
function onMouseDown(e) {
  if (e.target.closest("button")) return;
  if (e.target.closest(".editing")) return;
  if (e.target.tagName === "TEXTAREA") return;
  if (e.button !== 0) return;

  const card = e.target.closest(".card");
  if (!card) return;

  const colId = card.dataset.col;
  const idx = parseInt(card.dataset.idx);
  const tasks = loadTasks();
  const text = tasks[colId][idx];

  card.classList.add("dragging");
  const ghost = createGhost(text, e.clientX, e.clientY);

  dragState = { colId, idx, ghost, currentDropCol: null, currentDropIdx: 0 };

  document.addEventListener("mousemove", onMouseMove);
  document.addEventListener("mouseup", onMouseUp);
}

function onMouseMove(e) {
  if (!dragState) return;
  moveGhost(dragState.ghost, e.clientX, e.clientY);

  const { col, idx } = getDropTarget(e.clientX, e.clientY);
  dragState.currentDropCol = col;
  dragState.currentDropIdx = idx;
  showDropIndicator(col, idx);
}

function onMouseUp() {
  document.removeEventListener("mousemove", onMouseMove);
  document.removeEventListener("mouseup", onMouseUp);
  finishDrag();
}

/* ── Enter to submit ── */
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "TEXTAREA" && e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const colId = e.target.id.replace("input-", "");
    addTask(colId);
  }
});

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
