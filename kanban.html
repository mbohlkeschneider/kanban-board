<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf3f0;
    color: #4a4a4a;
    min-height: 100vh;
    overflow-x: auto;
    -webkit-user-select: none;
    user-select: none;
  }

  header {
    background: #fff;
    padding: 16px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: #5a4a5a;
    border-bottom: 3px solid #FFCBE1;
    letter-spacing: 0.5px;
  }

  .board {
    display: flex;
    gap: 12px;
    padding: 16px;
    min-height: calc(100vh - 62px);
  }

  .column {
    flex: 1;
    min-width: 170px;
    background: #fff;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 80px);

  }

  .column-header {
    padding: 14px 12px;
    font-weight: 700;
    font-size: 0.95rem;
    text-align: center;
    border-radius: 14px 14px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #5a4a5a;
  }

  .column-header .col-title {
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    transition: background 0.15s;
    flex: 1;
    text-align: center;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .column-header .col-title:hover {
    background: rgba(255,255,255,0.4);
  }

  .column-header .rename-input {
    background: rgba(255,255,255,0.7);
    border: 2px solid rgba(255,255,255,0.8);

    padding: 2px 6px;

    font-size: 0.95rem;
    font-weight: 700;
    color: #5a4a5a;

    width: 100%;
    flex: 1;

  .column-header .rename-input:focus { outline: none; }

  .btn-remove-col {

    cursor: pointer;
    color: #5a4a5a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .btn-remove-col:hover { background: rgba(255,255,255,0.7); }

  .add-column {
    min-width: 60px;
    background: rgba(255,255,255,0.6);
    border: 3px dashed #e0d8e0;

    display: flex;

  .add-column:hover {

  }

  .column-header .count {

  }

  .cards {
    flex: 1;

  .card {
    background: #fff;
    border-radius: 10px;

    position: relative;
    word-wrap: break-word;
    border: 2px solid #f0e8f0;
    cursor: grab;
    transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
  }

  .card:active { cursor: grabbing; }

  .card.long-press {
    transform: scale(1.03);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);

  .card.dragging {
    opacity: 0.4;

  .card-text {
    font-size: 0.9rem;
    margin-bottom: 8px;

  }

  .card-text p { margin: 0 0 4px 0; }
  .card-text p:last-child { margin-bottom: 0; }
  .card-text ul, .card-text ol { margin: 2px 0; padding-left: 20px; }
  .card-text li { margin: 1px 0; }
  .card-text code { background: #f0e8f0; padding: 1px 4px; border-radius: 3px; font-size: 0.8rem; }
  .card-text pre { background: #f0e8f0; padding: 6px; border-radius: 6px; overflow-x: auto; margin: 4px 0; }
  .card-text pre code { background: none; padding: 0; }
  .card-text strong { color: #5a4a5a; }
  .card-text h1, .card-text h2, .card-text h3 { font-size: 0.9rem; margin: 4px 0 2px 0; color: #5a4a5a; }

  .assignee-tag {
    display: inline-block;
    border: none;
    border-radius: 12px;

  }

  .assignee-tag.unassigned {
    background: #f0e8f0;

  }

  .assignee-tag[data-user="Nina"] {
    background: #FFCBE1;
    color: #5a4a5a;
  }

  .assignee-tag[data-user="Stephan"] {
    background: #BCD8EC;

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .card-actions button {
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    color: #5a4a5a;
    font-weight: 600;
    flex: 1;
    min-width: 0;
    transition: opacity 0.15s;
  }

  .btn-left { background: #BCD8EC; }

  .btn-edit { background: #FFCBE1; flex: 0 0 auto; }

  .card.editing { cursor: default; border-color: #DCCCEC; }

  .edit-area {

    background: #faf3f0;

    padding: 8px;
    font-family: inherit;

  .edit-area:focus { outline: none; border-color: #FFCBE1; }

  .edit-actions {
    display: flex;
    gap: 6px;
  }

  .edit-actions button {
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    color: #5a4a5a;

  .btn-save { background: #D6E5BD; }
  .btn-cancel { background: #f0e8f0; }

  .card-actions button:active { opacity: 0.6; }

  .add-form {
    padding: 8px;
    border-top: 2px solid #f5f0f5;
  }

  .add-form textarea {
    width: 100%;
    background: #faf3f0;
    border: 2px solid #f0e8f0;
    border-radius: 8px;
    color: #4a4a4a;
    padding: 8px;
    font-family: inherit;
    font-size: 0.85rem;

  .add-form textarea::placeholder { color: #b0a0b0; }
  .add-form textarea:focus { outline: none; border-color: #DCCCEC; }

  .add-form button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #DCCCEC;
    color: #5a4a5a;
    font-size: 0.85rem;

    cursor: pointer;

  .add-form button:active { opacity: 0.6; }

  .drop-indicator {
    height: 4px;
    background: #BCD8EC;
    border-radius: 2px;
    margin: 2px 0;
    transition: opacity 0.15s;
  }

  /* Ghost card that follows the pointer during drag */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.9;
    transform: rotate(2deg);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    background: #fff;
    border: 2px solid #DCCCEC;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    color: #4a4a4a;
    max-width: 220px;
    word-wrap: break-word;
    line-height: 1.4;
  }

  /* PIN overlay */
  #pin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(250, 243, 240, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }

  #pin-overlay.hidden { display: none; }

  .pin-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 320px;
    width: 90%;
  }

  .pin-box h2 {
    color: #5a4a5a;
    font-size: 1.2rem;
    margin-bottom: 6px;
  }

  .pin-box p {
    color: #b0a0b0;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .pin-box input {
    width: 100%;
    padding: 12px;
    border: 2px solid #f0e8f0;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    color: #4a4a4a;
    text-align: center;
    letter-spacing: 2px;
    -webkit-user-select: text;
    user-select: text;
  }

  .pin-box input:focus { outline: none; border-color: #DCCCEC; }

  .pin-box button {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #DCCCEC;
    color: #5a4a5a;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }

  .pin-box button:active { opacity: 0.6; }

  /* Connection status dot */
  .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ccc;
    margin-left: 8px;
    vertical-align: middle;
    transition: background 0.3s;

  .status-dot.connected { background: #8bc34a; }
  .status-dot.disconnected { background: #e57373; }

  @media (max-width: 600px) {
    .card-actions button {
      padding: 10px 12px;
      font-size: 0.85rem;
    }
  }
</style>

<body>

<div id="pin-overlay">
  <div class="pin-box">
    <h2>Enter Board PIN</h2>
    <p>Share the same PIN to sync between devices</p>
    <input type="password" id="pin-input" placeholder="PIN" autocomplete="off">
    <button id="pin-submit">Connect</button>
  </div>
</div>

<header>Kanban Board<span class="status-dot" id="status-dot" title="Offline"></span></header>

<div class="board" id="board"></div>

<script>
/* ── Firebase Config ── */
// TODO: Replace with your Firebase project config from console.firebase.google.com
const firebaseConfig = {
  apiKey: "AIzaSyBcWzRjHDj3z-31TAWGoeifwaapPA9hxuc",
  authDomain: "kanban-board-50317.firebaseapp.com",
  databaseURL: "https://kanban-board-50317-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kanban-board-50317",
  storageBucket: "kanban-board-50317.firebasestorage.app",
  messagingSenderId: "338983237494",
  appId: "1:338983237494:web:41e9d0e572c72e078fac57"
};

/* ── Firebase State ── */
let db = null;
let columnsRef = null;
let tasksRef = null;
let renderTimeout = null;

const PALETTE = ["#FFCBE1", "#F9E1A8", "#D6E5BD", "#BCD8EC", "#DCCCEC", "#FFDAB4"];

const DEFAULT_COLUMNS = [
  { id: "todo", title: "To Do", color: "#FFCBE1" },
  { id: "doing", title: "In Progress", color: "#F9E1A8" },
  { id: "done", title: "Done", color: "#D6E5BD" },
];

/* ── Firebase data normalization ── */
// Firebase drops empty arrays and converts arrays to objects with numeric keys
function normalizeFirebaseColumns(data) {
  if (!data) return null;
  if (Array.isArray(data)) return data;
  // Object with numeric keys → array
  if (typeof data === "object") {
    const keys = Object.keys(data);
    if (keys.every(k => !isNaN(k))) return keys.sort((a,b) => a - b).map(k => data[k]);
    return Object.values(data);
  }
  return null;
}

function normalizeFirebaseTasks(data) {
  if (!data) return {};
  const result = {};
  for (const colId in data) {
    const col = data[colId];
    if (Array.isArray(col)) {
      result[colId] = col;
    } else if (typeof col === "object" && col !== null) {
      const keys = Object.keys(col);
      result[colId] = keys.sort((a,b) => a - b).map(k => col[k]);
    } else {
      result[colId] = [];
    }
  }
  return result;
}

function loadColumns() {
  try {
    const saved = JSON.parse(localStorage.getItem("kanban_columns"));
    if (saved && saved.length) return saved;
  } catch {}
  return DEFAULT_COLUMNS.map(c => ({ ...c }));
}

function saveColumns(cols) {
  localStorage.setItem("kanban_columns", JSON.stringify(cols));
  if (columnsRef) columnsRef.set(cols);
}

function loadTasks() {
  try {
    return JSON.parse(localStorage.getItem("kanban_tasks")) || {};
  } catch {
    return {};
  }
}

function saveTasks(tasks) {
  localStorage.setItem("kanban_tasks", JSON.stringify(tasks));
  if (tasksRef) tasksRef.set(tasks);
}

/* ── SHA-256 hashing for PIN → boardId ── */
async function hashPin(pin) {
  const data = new TextEncoder().encode(pin);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
}

/* ── Firebase Connection ── */
function connectFirebase(boardId) {
  try {
    if (!window.firebase || !window.firebase.database) return;

    db = firebase.database();
    columnsRef = db.ref("boards/" + boardId + "/columns");
    tasksRef = db.ref("boards/" + boardId + "/tasks");

    // Connection status indicator
    const dot = document.getElementById("status-dot");
    db.ref(".info/connected").on("value", (snap) => {
      if (snap.val() === true) {
        dot.className = "status-dot connected";
        dot.title = "Connected";
      } else {
        dot.className = "status-dot disconnected";
        dot.title = "Offline";
      }
    });

    // Real-time sync for columns
    columnsRef.on("value", (snap) => {
      const data = snap.val();
      const cols = normalizeFirebaseColumns(data);
      if (cols && cols.length) {
        localStorage.setItem("kanban_columns", JSON.stringify(cols));
        debouncedRender();
      } else if (!data) {
        // First connection with no remote data → push defaults
        const localCols = loadColumns();
        columnsRef.set(localCols);
      }
    });

    // Real-time sync for tasks
    tasksRef.on("value", (snap) => {
      const data = snap.val();
      if (data !== null) {
        const tasks = normalizeFirebaseTasks(data);
        localStorage.setItem("kanban_tasks", JSON.stringify(tasks));
        debouncedRender();
      } else {
        // First connection with no remote data → push defaults
        const localTasks = loadTasks();
        tasksRef.set(localTasks);
      }
    });
  } catch (e) {
    console.warn("Firebase connection failed, using localStorage only:", e);
  }
}

function debouncedRender() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render, 50);
}

/* ── PIN / Init Flow ── */
async function initApp() {
  const storedBoardId = localStorage.getItem("kanban_board_id");

  if (storedBoardId) {
    // Have a boardId — render immediately from localStorage, then connect
    document.getElementById("pin-overlay").classList.add("hidden");
    render();
    connectFirebase(storedBoardId);
  } else {
    // Show PIN overlay
    document.getElementById("pin-overlay").classList.remove("hidden");
  }
}

document.getElementById("pin-submit").addEventListener("click", async () => {
  const pin = document.getElementById("pin-input").value.trim();
  if (!pin) return;

  const boardId = await hashPin(pin);
  localStorage.setItem("kanban_pin", pin);
  localStorage.setItem("kanban_board_id", boardId);
  document.getElementById("pin-overlay").classList.add("hidden");
  render();
  connectFirebase(boardId);
});

document.getElementById("pin-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("pin-submit").click();
  }
});

/* ── Drag State ── */
let dragState = null; // { colId, idx, ghost, currentDropCol, currentDropIdx, scrollInterval }

const USERS = ["Nina", "Stephan"];

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

/* Normalize a task entry: old format (string) → { text, assignee } */
function normalizeTask(item) {
  if (typeof item === "string") return { text: item, assignee: "" };
  return item;
}

/* ── Rendering ── */
function render() {
  const columns = loadColumns();
  const tasks = loadTasks();
  const board = document.getElementById("board");
  board.innerHTML = "";

  columns.forEach((col, colIdx) => {
    const colEl = document.createElement("div");
    colEl.className = "column";
    colEl.dataset.col = col.id;

    const items = tasks[col.id] || [];

    colEl.innerHTML = `
      <div class="column-header" style="background:${col.color}">
        <span class="col-title" onclick="startRename('${col.id}')">${escapeHtml(col.title)}</span>
        <span class="count">${items.length}</span>
        <button class="btn-remove-col" onclick="removeColumn('${col.id}')" title="Remove column">&#x2715;</button>
      </div>
      <div class="cards" data-col="${col.id}"></div>
      <div class="add-form">
        <textarea id="input-${col.id}" placeholder="New task..." rows="2"></textarea>
        <button onclick="addTask('${col.id}')">+ Add</button>
      </div>
    `;

    board.appendChild(colEl);
    const cardsEl = colEl.querySelector(".cards");

    items.forEach((rawItem, idx) => {
      const item = normalizeTask(rawItem);
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.col = col.id;
      card.dataset.idx = idx;

      const canLeft = colIdx > 0;
      const canRight = colIdx < columns.length - 1;

      let btns = "";
      if (canLeft) btns += `<button class="btn-left" onclick="moveTask('${col.id}',${idx},-1)">&larr;</button>`;
      if (canRight) btns += `<button class="btn-right" onclick="moveTask('${col.id}',${idx},1)">&rarr;</button>`;
      btns += `<button class="btn-edit" onclick="editTask('${col.id}',${idx})">&#9998;</button>`;
      btns += `<button class="btn-delete" onclick="deleteTask('${col.id}',${idx})">&#x2715;</button>`;

      const assigneeLabel = item.assignee || "—";
      const assigneeClass = item.assignee ? `" data-user="${item.assignee}` : ' unassigned';

      const renderedText = window.marked ? marked.parse(item.text) : escapeHtml(item.text);
      card.innerHTML = `
        <div class="card-text">${renderedText}</div>
        <button class="assignee-tag${assigneeClass}" onclick="cycleAssignee('${col.id}',${idx})">${escapeHtml(assigneeLabel)}</button>
        <div class="card-actions">${btns}</div>
      `;

      // Touch drag
      card.addEventListener("touchstart", onTouchStart, { passive: false });

      // Mouse drag
      card.addEventListener("mousedown", onMouseDown);

      cardsEl.appendChild(card);
    });
  });

  // Add column button
  const addColBtn = document.createElement("div");
  addColBtn.className = "add-column";
  addColBtn.textContent = "+";
  addColBtn.title = "Add column";
  addColBtn.onclick = addColumn;
  board.appendChild(addColBtn);
}

/* ── Add / Delete / Move (button-based) ── */
function addTask(colId) {
  const input = document.getElementById("input-" + colId);
  const text = input.value.trim();
  if (!text) return;
  const tasks = loadTasks();
  if (!tasks[colId]) tasks[colId] = [];
  tasks[colId].push({ text, assignee: "" });
  saveTasks(tasks);
  render();
}

function deleteTask(colId, idx) {
  const tasks = loadTasks();
  tasks[colId].splice(idx, 1);
  saveTasks(tasks);
  render();
}

function editTask(colId, idx) {
  const tasks = loadTasks();
  const item = normalizeTask(tasks[colId][idx]);
  const card = document.querySelector(`.card[data-col="${colId}"][data-idx="${idx}"]`);
  if (!card) return;

  card.classList.add("editing");
  card.removeEventListener("touchstart", onTouchStart);
  card.removeEventListener("mousedown", onMouseDown);

  card.innerHTML = `
    <textarea class="edit-area" rows="3">${escapeHtml(item.text)}</textarea>
    <div class="edit-actions">
      <button class="btn-save" onclick="saveEdit('${colId}',${idx})">Save</button>
      <button class="btn-cancel" onclick="render()">Cancel</button>
    </div>
  `;

  const textarea = card.querySelector(".edit-area");
  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
}

function saveEdit(colId, idx) {
  const card = document.querySelector(`.card[data-col="${colId}"][data-idx="${idx}"]`);
  if (!card) return;
  const textarea = card.querySelector(".edit-area");
  const newText = textarea.value.trim();
  if (!newText) return;

  const tasks = loadTasks();
  const item = normalizeTask(tasks[colId][idx]);
  item.text = newText;
  tasks[colId][idx] = item;
  saveTasks(tasks);
  render();
}

function cycleAssignee(colId, idx) {
  const tasks = loadTasks();
  const item = normalizeTask(tasks[colId][idx]);
  const cycle = ["", ...USERS]; // "" → Nina → Stephan → ""
  const next = (cycle.indexOf(item.assignee) + 1) % cycle.length;
  item.assignee = cycle[next];
  tasks[colId][idx] = item;
  saveTasks(tasks);
  render();
}

function moveTask(fromCol, idx, direction) {
  const columns = loadColumns();
  const toCol = columns[columns.findIndex(c => c.id === fromCol) + direction].id;
  const tasks = loadTasks();
  if (!tasks[fromCol]) return;
  const [item] = tasks[fromCol].splice(idx, 1);
  if (!tasks[toCol]) tasks[toCol] = [];
  tasks[toCol].push(item);
  saveTasks(tasks);
  render();
}

/* ── Column Management ── */
function addColumn() {
  const columns = loadColumns();
  const color = PALETTE[columns.length % PALETTE.length];
  const newCol = { id: "col_" + Date.now(), title: "New Column", color };
  columns.push(newCol);
  saveColumns(columns);
  const tasks = loadTasks();
  tasks[newCol.id] = [];
  saveTasks(tasks);
  render();
  // Auto-start rename on the new column
  startRename(newCol.id);
}

function removeColumn(colId) {
  const columns = loadColumns();
  if (columns.length <= 1) {
    alert("You need at least one column.");
    return;
  }
  const tasks = loadTasks();
  const items = tasks[colId] || [];
  if (items.length > 0) {
    if (!confirm(`"${columns.find(c => c.id === colId).title}" has ${items.length} task(s). Delete this column and all its tasks?`)) return;
  }
  saveColumns(columns.filter(c => c.id !== colId));
  delete tasks[colId];
  saveTasks(tasks);
  render();
}

function startRename(colId) {
  const header = document.querySelector(`.column[data-col="${colId}"] .column-header`);
  if (!header) return;
  const titleEl = header.querySelector(".col-title");
  if (!titleEl) return;

  const columns = loadColumns();
  const col = columns.find(c => c.id === colId);
  if (!col) return;

  const input = document.createElement("input");
  input.className = "rename-input";
  input.value = col.title;
  input.maxLength = 30;

  titleEl.replaceWith(input);
  input.focus();
  input.select();

  function finishRename() {
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== col.title) {
      const cols = loadColumns();
      const c = cols.find(c => c.id === colId);
      if (c) {
        c.title = newTitle;
        saveColumns(cols);
      }
    }
    render();
  }

  input.addEventListener("blur", finishRename);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    if (e.key === "Escape") { input.removeEventListener("blur", finishRename); render(); }
  });
}

/* ── Drag helpers ── */
function createGhost(text, x, y) {
  const ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  ghost.textContent = text;
  ghost.style.left = (x - 40) + "px";
  ghost.style.top = (y - 20) + "px";
  document.body.appendChild(ghost);
  return ghost;
}

function moveGhost(ghost, x, y) {
  ghost.style.left = (x - 40) + "px";
  ghost.style.top = (y - 20) + "px";
}

function getDropTarget(x, y) {
  const cardEls = document.querySelectorAll(".cards");
  let bestCol = null;
  let bestIdx = 0;

  for (const cardsEl of cardEls) {
    const rect = cardsEl.getBoundingClientRect();
    // Check if x is roughly within this column
    if (x >= rect.left - 20 && x <= rect.right + 20) {
      bestCol = cardsEl.dataset.col;
      const children = cardsEl.querySelectorAll(".card");
      bestIdx = children.length; // default: append at end

      for (let i = 0; i < children.length; i++) {
        const cardRect = children[i].getBoundingClientRect();
        const midY = cardRect.top + cardRect.height / 2;
        if (y < midY) {
          bestIdx = i;
          break;
        }
      }
      break;
    }
  }

  return { col: bestCol, idx: bestIdx };
}

function clearDropIndicators() {
  document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
  document.querySelectorAll(".cards.drag-over").forEach(el => el.classList.remove("drag-over"));
}

function showDropIndicator(col, idx) {
  clearDropIndicators();
  if (!col) return;

  const cardsEl = document.querySelector(`.cards[data-col="${col}"]`);
  if (!cardsEl) return;

  cardsEl.classList.add("drag-over");

  const indicator = document.createElement("div");
  indicator.className = "drop-indicator";

  const children = cardsEl.querySelectorAll(".card");
  if (idx >= children.length) {
    cardsEl.appendChild(indicator);
  } else {
    cardsEl.insertBefore(indicator, children[idx]);
  }
}

/* ── Auto-scroll during drag ── */
const SCROLL_EDGE = 50; // px from screen edge to trigger scroll
const SCROLL_SPEED = 8; // px per frame

function updateAutoScroll(x) {
  const board = document.getElementById("board");
  const screenW = window.innerWidth;

  if (dragState.scrollInterval) {
    clearInterval(dragState.scrollInterval);
    dragState.scrollInterval = null;
  }

  if (x < SCROLL_EDGE) {
    dragState.scrollInterval = setInterval(() => { board.scrollLeft -= SCROLL_SPEED; }, 16);
  } else if (x > screenW - SCROLL_EDGE) {
    dragState.scrollInterval = setInterval(() => { board.scrollLeft += SCROLL_SPEED; }, 16);
  }
}

function finishDrag() {
  if (!dragState) return;

  const { colId, idx, ghost } = dragState;
  const dropCol = dragState.currentDropCol;
  let dropIdx = dragState.currentDropIdx;

  // Clean up
  if (dragState.scrollInterval) clearInterval(dragState.scrollInterval);
  if (ghost) ghost.remove();
  clearDropIndicators();
  document.querySelectorAll(".card.dragging").forEach(el => el.classList.remove("dragging"));

  // Perform the move if we have a valid target
  if (dropCol) {
    const tasks = loadTasks();
    const [item] = tasks[colId].splice(idx, 1);

    // Adjust index if moving within the same column downward
    if (colId === dropCol && dropIdx > idx) {
      dropIdx--;
    }

    tasks[dropCol].splice(dropIdx, 0, item);
    saveTasks(tasks);
  }

  dragState = null;
  render();
}

/* ── Touch Drag (long-press to initiate) ── */
const LONG_PRESS_MS = 300;
const LONG_PRESS_MOVE_THRESHOLD = 10; // px – cancel if finger moves before timer
let longPressTimer = null;
let longPressCard = null;
let longPressStartX = 0;
let longPressStartY = 0;
let touchDragActive = false;

function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  if (longPressCard) { longPressCard.classList.remove("long-press"); longPressCard = null; }
}

function onTouchStart(e) {
  // Don't drag if tapping a button or editing
  if (e.target.closest("button")) return;
  if (e.target.closest(".editing")) return;
  if (e.target.tagName === "TEXTAREA") return;

  const card = e.target.closest(".card");
  if (!card) return;

  const touch = e.touches[0];
  longPressStartX = touch.clientX;
  longPressStartY = touch.clientY;
  longPressCard = card;
  touchDragActive = false;

  // Start long-press timer
  longPressTimer = setTimeout(() => {
    longPressTimer = null;
    // Activate drag
    const colId = card.dataset.col;
    const idx = parseInt(card.dataset.idx);
    const tasks = loadTasks();
    const item = normalizeTask(tasks[colId][idx]);

    card.classList.remove("long-press");
    card.classList.add("dragging");
    const ghost = createGhost(item.text, touch.clientX, touch.clientY);

    dragState = { colId, idx, ghost, currentDropCol: null, currentDropIdx: 0 };
    touchDragActive = true;

    // Vibrate for haptic feedback if available
    if (navigator.vibrate) navigator.vibrate(30);
  }, LONG_PRESS_MS);

  // Show visual feedback after a short delay
  setTimeout(() => { if (longPressTimer && longPressCard === card) card.classList.add("long-press"); }, 100);

  document.addEventListener("touchmove", onTouchMove, { passive: false });
  document.addEventListener("touchend", onTouchEnd);
}

function onTouchMove(e) {
  const touch = e.touches[0];

  // If long-press hasn't fired yet, check if finger moved too far (= scrolling)
  if (longPressTimer) {
    const dx = touch.clientX - longPressStartX;
    const dy = touch.clientY - longPressStartY;
    if (Math.abs(dx) > LONG_PRESS_MOVE_THRESHOLD || Math.abs(dy) > LONG_PRESS_MOVE_THRESHOLD) {
      cancelLongPress();
      // Let the browser handle native scrolling
      return;
    }
    e.preventDefault(); // Hold still = don't scroll yet
    return;
  }

  if (!touchDragActive || !dragState) return;
  e.preventDefault();
  moveGhost(dragState.ghost, touch.clientX, touch.clientY);
  updateAutoScroll(touch.clientX);

  const { col, idx } = getDropTarget(touch.clientX, touch.clientY);
  dragState.currentDropCol = col;
  dragState.currentDropIdx = idx;
  showDropIndicator(col, idx);
}

function onTouchEnd() {
  cancelLongPress();
  document.removeEventListener("touchmove", onTouchMove);
  document.removeEventListener("touchend", onTouchEnd);
  if (touchDragActive) {
    touchDragActive = false;
    finishDrag();
  }
}

/* ── Mouse Drag ── */
function onMouseDown(e) {
  if (e.target.closest("button")) return;
  if (e.target.closest(".editing")) return;
  if (e.target.tagName === "TEXTAREA") return;
  if (e.button !== 0) return;

  const card = e.target.closest(".card");
  if (!card) return;

  const colId = card.dataset.col;
  const idx = parseInt(card.dataset.idx);
  const tasks = loadTasks();
  const item = normalizeTask(tasks[colId][idx]);

  card.classList.add("dragging");
  const ghost = createGhost(item.text, e.clientX, e.clientY);

  dragState = { colId, idx, ghost, currentDropCol: null, currentDropIdx: 0 };

  document.addEventListener("mousemove", onMouseMove);
  document.addEventListener("mouseup", onMouseUp);
}

function onMouseMove(e) {
  if (!dragState) return;
  moveGhost(dragState.ghost, e.clientX, e.clientY);
  updateAutoScroll(e.clientX);

  const { col, idx } = getDropTarget(e.clientX, e.clientY);
  dragState.currentDropCol = col;
  dragState.currentDropIdx = idx;
  showDropIndicator(col, idx);
}

function onMouseUp() {
  document.removeEventListener("mousemove", onMouseMove);
  document.removeEventListener("mouseup", onMouseUp);
  finishDrag();
}

/* ── Enter to submit (desktop only) ── */
const isTouchDevice = "ontouchstart" in window || navigator.maxTouchPoints > 0;
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "TEXTAREA" && e.key === "Enter" && !e.shiftKey && !isTouchDevice) {
    e.preventDefault();
    const colId = e.target.id.replace("input-", "");
    addTask(colId);
  }
});

// Configure marked for card-friendly output
if (window.marked) {
  marked.setOptions({ breaks: true });
}

// Initialize Firebase SDK if available, then start app
try {
  if (window.firebase && firebaseConfig.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(firebaseConfig);
  }
} catch (e) {
  console.warn("Firebase init skipped:", e);
}

initApp();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
